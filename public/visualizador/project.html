<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07101f" />
  <title>Projeto salvo</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;font-family:Arial,sans-serif;background:#07101f;color:#fff}.bar{height:58px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.1);background:#101d31}.bar div{min-width:0}.bar strong,.bar small{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar small{color:#9ba9be}.actions{display:flex;gap:8px}.actions a{padding:9px 12px;border:1px solid rgba(255,255,255,.12);border-radius:10px;color:white;text-decoration:none;font-size:13px;font-weight:bold}.actions a:last-child{background:#6d5dfc}.frame{width:100%;height:calc(100% - 58px);border:0;background:white}.empty{height:calc(100% - 58px);display:grid;place-items:center;padding:24px;text-align:center}.empty p{color:#9ba9be;max-width:580px}@media(max-width:620px){.bar small{display:none}.actions a:first-child{display:none}}
  </style>
</head>
<body>
  <header class="bar">
    <div><strong id="title">Projeto salvo</strong><small>Versão armazenada neste navegador</small></div>
    <nav class="actions"><a href="/">Meus projetos</a><a id="editLink" href="/visualizador/">Editar</a></nav>
  </header>
  <iframe class="frame" id="frame" title="Projeto"></iframe>
  <section class="empty" id="empty" hidden><div><h1>Projeto não encontrado neste navegador</h1><p>Projetos salvos localmente só ficam disponíveis no mesmo aparelho e navegador. Use “Publicar online” no editor para enviá-los ao GitHub e à Vercel.</p><a href="/" style="color:#a5b4fc">Voltar aos projetos</a></div></section>
  <script src="/visualizador/storage.js"></script>
  <script src="/visualizador/project.js"></script>
</body>
</html>
